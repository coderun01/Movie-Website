<!DOCTYPE html>
<html>

<head>
<title>MovieFlix</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>🎬 MovieFlix</h1>

<input type="text" placeholder="Search movie..." id="search">

</header>
<section id="banner">
<h1 id="banner-title"></h1>
<p id="banner-overview"></p>

<button id="banner-btn">▶ Watch Trailer</button>
</section>
<h2>🔥 Trending Movies</h2>

<div class="trending-container" id="trending"></div>

<div id="movie-container"></div>

<div id="trailer-popup">

<span id="close">✖</span>

<iframe
id="trailer-video"
width="800"
height="450"
src=""
frameborder="0"
allowfullscreen>
</iframe>

</div>

<script src="script.js"></script>

</body>

</html>
